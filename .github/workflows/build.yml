name: Build Production Android Assets

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: ''

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview ProGuard
        run: |
          CACHE="${PUB_CACHE:-$HOME/.pub-cache}"
          find "$CACHE" -name "build.gradle" -path "*/flutter_inappwebview_android*" 2>/dev/null | while read -r f; do
            chmod +w "$f" 2>/dev/null || true
            sed -i "s/getDefaultProguardFile('proguard-android\.txt')/getDefaultProguardFile('proguard-android-optimize.txt')/g" "$f"
            echo "✓ ProGuard patched: $f"
          done

      - name: Patch jcenter to mavenCentral
        run: |
          CACHE="${PUB_CACHE:-$HOME/.pub-cache}"
          find "$CACHE" -name "build.gradle" -exec sed -i 's/jcenter()/mavenCentral()/g' {} +
          echo "✓ jcenter replaced"

      - name: Regenerate Android Platform Files
        run: |
          rm -rf android
          flutter create --platforms android --org com.example --project-name nova_x .
          echo "✓ android/ regenerated"

      - name: Copy google-services.json
        run: |
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/google-services.json
            echo "✓ google-services.json copied"
          else
            echo "::error::google-services.json NOT FOUND in repo root!"
            exit 1
          fi

      # ── App icon: styled icon with blue background + properly scaled logo ────
      # Fixes: (1) transparent logo showing white bg on Android
      #        (2) distorted aspect ratio from naive square resize
      #        (3) logo too small — now fills 90% of icon space
      - name: Set app icon from logo.png
        run: |
          pip install Pillow --break-system-packages -q
          python3 << 'PYEOF2'
          from PIL import Image, ImageDraw
          import os

          logo_path = 'assets/images/logo.png'
          if not os.path.exists(logo_path):
              print(f'WARNING: {logo_path} not found')
              exit(0)

          sizes = {
              'mipmap-mdpi': 48, 'mipmap-hdpi': 72,
              'mipmap-xhdpi': 96, 'mipmap-xxhdpi': 144, 'mipmap-xxxhdpi': 192,
          }

          # 1. Load and crop to content bounds
          logo = Image.open(logo_path).convert('RGBA')
          bbox = logo.getbbox()
          if bbox:
              logo = logo.crop(bbox)
          lw, lh = logo.size

          # 2. Center-square crop — logo is landscape (wide) due to lightning arms.
          #    Taking the center square focuses on the main circular design,
          #    keeping it bold and properly proportioned in the round/square icon.
          half   = min(lw, lh) // 2
          cx, cy = lw // 2, lh // 2
          logo   = logo.crop((cx - half, cy - half, cx + half, cy + half))

          for dir_name, size in sizes.items():
              # 3. White background
              bg   = Image.new('RGBA', (size, size), (255, 255, 255, 255))

              # 4. Scale logo to 90% fill — bold and clearly visible
              logo_sz = int(size * 0.90)
              logo_r  = logo.resize((logo_sz, logo_sz), Image.LANCZOS)

              # 5. Center logo on background
              off = (size - logo_sz) // 2
              bg.paste(logo_r, (off, off), logo_r)

              # 6. Save as RGB (remove alpha for launcher icon compatibility)
              final = bg.convert('RGB')
              out   = f'android/app/src/main/res/{dir_name}'
              os.makedirs(out, exist_ok=True)
              final.save(f'{out}/ic_launcher.png')
              final.save(f'{out}/ic_launcher_round.png')
              print(f'  ✓ {dir_name}: {size}x{size}px — logo fills {logo_sz}px ({logo_sz*100//size}%)')

          print('✅ App icon: blue gradient background + 90% bold logo')
          PYEOF2

      # ── Firebase: add google-services plugin inside plugins {} block ──────
      - name: Apply Google Services Plugin (Firebase)
        run: |
          APP="android/app/build.gradle"
          SET="android/settings.gradle"
          if ! grep -q "com.google.gms.google-services" "$SET"; then
            sed -i '/id "com.android.application" version/a\    id "com.google.gms.google-services" version "4.4.0" apply false' "$SET"
            echo "✓ google-services declared in settings.gradle"
          fi
          if ! grep -q "com.google.gms.google-services" "$APP"; then
            sed -i '/^plugins {/a\    id "com.google.gms.google-services"' "$APP"
            echo "✓ google-services applied in app/build.gradle"
          fi
          if head -3 "$APP" | grep -q "^apply plugin"; then
            echo "::error::apply plugin: found before plugins {} — Gradle will fail"
            exit 1
          fi
          echo "✅ Firebase Gradle verified"

      - name: Bump compileSdk to 35
        run: |
          F="android/app/build.gradle"
          sed -i 's/compileSdkVersion flutter\.compileSdkVersion/compileSdkVersion 35/g' "$F"
          sed -i 's/targetSdkVersion flutter\.targetSdkVersion/targetSdkVersion 35/g'   "$F"
          sed -i 's/compileSdk flutter\.compileSdkVersion/compileSdk 35/g'              "$F"
          sed -i 's/targetSdk flutter\.targetSdkVersion/targetSdk 35/g'                 "$F"
          sed -i 's/compileSdk = flutter\.compileSdkVersion/compileSdk = 35/g'          "$F"
          sed -i 's/targetSdk = flutter\.targetSdkVersion/targetSdk = 35/g'             "$F"
          echo "✓ compileSdk bumped to 35"
          grep -E "compileSdk|targetSdk" "$F"

      # ── Manifest patch — IDENTICAL to the old working step ───────────────
      # DO NOT add android:launchMode here — Flutter 3.24.5 already generates
      # it in MainActivity. Adding it again creates a duplicate XML attribute
      # which causes: "Error parsing AndroidManifest.xml"
      - name: Patch AndroidManifest
        run: |
          M="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:label="nova_x"/android:label="NOVA X"/' "$M"
          sed -i 's|<manifest xmlns:android="http://schemas.android.com/apk/res/android">|<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>|' "$M"
          sed -i 's|android:icon="@mipmap/ic_launcher">|android:icon="@mipmap/ic_launcher"\n        android:usesCleartextTraffic="true"\n        android:hardwareAccelerated="true">|' "$M"
          echo "✓ AndroidManifest patched (label + permissions + app attributes)"

      # ── FCM tap fix — separate safe step using Python ─────────────────────
      # Adds FLUTTER_NOTIFICATION_CLICK intent-filter so tapping a push
      # notification opens the app. Uses Python for safe XML insertion without
      # risking duplicate attributes.
      - name: Add FCM notification tap support
        run: |
          python3 << 'PYEOF'
          content = open('android/app/src/main/AndroidManifest.xml').read()

          # Add FLUTTER_NOTIFICATION_CLICK intent-filter after the first
          # </intent-filter> (the launcher one). Only if not already present.
          if 'FLUTTER_NOTIFICATION_CLICK' not in content:
              fcm_filter = (
                  '</intent-filter>\n'
                  '            <intent-filter>\n'
                  '                <action android:name="FLUTTER_NOTIFICATION_CLICK"/>\n'
                  '                <category android:name="android.intent.category.DEFAULT"/>\n'
                  '            </intent-filter>'
              )
              content = content.replace('</intent-filter>', fcm_filter, 1)
              print('✓ FLUTTER_NOTIFICATION_CLICK intent-filter added')
          else:
              print('FLUTTER_NOTIFICATION_CLICK already present — skipping')

          # Add FCM channel + icon + colour metadata before </application>.
          # Only if not already present.
          if 'nova_x_channel' not in content:
              fcm_meta = (
                  '        <meta-data android:name="com.google.firebase.messaging.default_notification_channel_id" android:value="nova_x_channel"/>\n'
                  '        <meta-data android:name="com.google.firebase.messaging.default_notification_icon" android:resource="@mipmap/ic_launcher"/>\n'
                  '        <meta-data android:name="com.google.firebase.messaging.default_notification_color" android:resource="@color/nova_x_cyan"/>\n'
                  '    </application>'
              )
              content = content.replace('    </application>', fcm_meta, 1)
              print('✓ FCM channel metadata added')
          else:
              print('FCM channel metadata already present — skipping')

          open('android/app/src/main/AndroidManifest.xml', 'w').write(content)
          PYEOF

          echo "--- Final AndroidManifest.xml ---"
          cat android/app/src/main/AndroidManifest.xml

      # ── Notification colour (cyan) ─────────────────────────────────────────
      - name: Create notification colour resource
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/colors.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="nova_x_cyan">#00D4FF</color>
          </resources>
          XMLEOF
          echo "✓ colors.xml created"


      # ── App Shortcuts — long-press home screen icon ───────────────────────────
      - name: Write MainActivity.kt with shortcut support
        run: |
          mkdir -p android/app/src/main/kotlin/com/example/nova_x
          echo "" | base64 -d > android/app/src/main/kotlin/com/example/nova_x/MainActivity.kt
          echo "✓ MainActivity.kt written"

      - name: Create shortcut resources
        run: |
          python3 - << 'PYEOF2'
          import os, textwrap
          os.makedirs('android/app/src/main/res/xml',      exist_ok=True)
          os.makedirs('android/app/src/main/res/drawable', exist_ok=True)

          open('android/app/src/main/res/xml/shortcuts.xml','w').write(textwrap.dedent('''
            <?xml version="1.0" encoding="utf-8"?>
            <shortcuts xmlns:android="http://schemas.android.com/apk/res/android">
              <shortcut android:shortcutId="new_tab" android:enabled="true"
                  android:icon="@drawable/ic_sc_new_tab"
                  android:shortcutShortLabel="@string/sc_new_tab_s"
                  android:shortcutLongLabel="@string/sc_new_tab_l">
                <intent android:action="com.example.nova_x.NEW_TAB"
                    android:targetPackage="com.example.nova_x"
                    android:targetClass="com.example.nova_x.MainActivity"/>
              </shortcut>
              <shortcut android:shortcutId="private_tab" android:enabled="true"
                  android:icon="@drawable/ic_sc_private"
                  android:shortcutShortLabel="@string/sc_private_s"
                  android:shortcutLongLabel="@string/sc_private_l">
                <intent android:action="com.example.nova_x.PRIVATE_TAB"
                    android:targetPackage="com.example.nova_x"
                    android:targetClass="com.example.nova_x.MainActivity"/>
              </shortcut>
              <shortcut android:shortcutId="business" android:enabled="true"
                  android:icon="@drawable/ic_sc_business"
                  android:shortcutShortLabel="@string/sc_business_s"
                  android:shortcutLongLabel="@string/sc_business_l">
                <intent android:action="com.example.nova_x.BUSINESS"
                    android:targetPackage="com.example.nova_x"
                    android:targetClass="com.example.nova_x.MainActivity"/>
              </shortcut>
            </shortcuts>
          ''').strip())

          open('android/app/src/main/res/drawable/ic_sc_new_tab.xml','w').write(
            '<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24">'
            '<path android:fillColor="#00D4FF" android:pathData="M19,13H13v6H11v-6H5v-2H11V5H13v6H19v2Z"/></vector>')

          open('android/app/src/main/res/drawable/ic_sc_private.xml','w').write(
            '<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24">'
            '<path android:fillColor="#7C4DFF" android:pathData="M12,1L3,5v6c0,5.55 3.84,10.74 9,12 5.16,-1.26 9,-6.45 9,-12V5L12,1zM12,11.99h7c-0.53,4.12-3.28,7.79-7,8.94V12H5V6.3l7,-3.11v8.8z"/></vector>')

          open('android/app/src/main/res/drawable/ic_sc_business.xml','w').write(
            '<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24">'
            '<path android:fillColor="#00D4FF" android:pathData="M12,7V3H2v18H22V7H12zM6,19H4v-2H6v2zM6,15H4v-2H6v2zM6,11H4V9H6v2zM6,7H4V5H6v2zM10,19H8v-2H10v2zM10,15H8v-2H10v2zM10,11H8V9H10v2zM10,7H8V5H10v2zM20,19H12v-2H14v-2H12v-2H14v-2H12V9H20v10zM18,11H16v2H18v-2zM18,15H16v2H18v-2z"/></vector>')

          open('android/app/src/main/res/values/strings.xml','w').write(textwrap.dedent('''
            <?xml version="1.0" encoding="utf-8"?>
            <resources>
              <string name="sc_new_tab_s">New Tab</string>
              <string name="sc_new_tab_l">Open New Tab in NOVA X</string>
              <string name="sc_private_s">Private Tab</string>
              <string name="sc_private_l">Open Private Browsing</string>
              <string name="sc_business_s">Business</string>
              <string name="sc_business_l">NOVA X Business Directory</string>
            </resources>
          ''').strip())

          print('shortcut XML, icons, strings created')
          PYEOF2

      - name: Patch AndroidManifest for shortcuts
        run: |
          python3 - << 'PYEOF3'
          content = open('android/app/src/main/AndroidManifest.xml').read()
          if 'android.app.shortcuts' not in content:
              block = (
                '        <meta-data android:name="android.app.shortcuts" '
                'android:resource="@xml/shortcuts"/>\n'
                '        <intent-filter>\n'
                '            <action android:name="com.example.nova_x.NEW_TAB"/>\n'
                '            <category android:name="android.intent.category.DEFAULT"/>\n'
                '        </intent-filter>\n'
                '        <intent-filter>\n'
                '            <action android:name="com.example.nova_x.PRIVATE_TAB"/>\n'
                '            <category android:name="android.intent.category.DEFAULT"/>\n'
                '        </intent-filter>\n'
                '        <intent-filter>\n'
                '            <action android:name="com.example.nova_x.BUSINESS"/>\n'
                '            <category android:name="android.intent.category.DEFAULT"/>\n'
                '        </intent-filter>\n'
                '    </activity>'
              )
              content = content.replace('    </activity>', block, 1)
              open('android/app/src/main/AndroidManifest.xml','w').write(content)
              print('Shortcut manifest metadata added')
          import xml.etree.ElementTree as ET
          ET.parse('android/app/src/main/AndroidManifest.xml')
          print('AndroidManifest valid XML')
          PYEOF3

      - name: Configure Gradle Java Home
        run: echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - name: Final Verification
        run: |
          echo "=== google-services.json ==="
          ls -la android/app/google-services.json
          echo "=== compileSdk ==="
          grep -E "compileSdk|targetSdk" android/app/build.gradle | head -4
          echo "=== FCM intent filter ==="
          grep "FLUTTER_NOTIFICATION_CLICK" android/app/src/main/AndroidManifest.xml
          echo "=== launchMode (Flutter already generates this) ==="
          grep "launchMode" android/app/src/main/AndroidManifest.xml
          echo "=== No duplicate attributes check ==="
          python3 -c "
          import xml.etree.ElementTree as ET
          try:
              ET.parse('android/app/src/main/AndroidManifest.xml')
              print('✅ AndroidManifest.xml is valid XML')
          except Exception as e:
              print(f'❌ XML error: {e}')
              exit(1)
          "
          echo "✅ All verified — starting Gradle build"

      - name: Build Release APK
        run: flutter build apk --release

      - name: Build Release AAB
        run: flutter build appbundle --release

      - name: Archive Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nova-x-v2.6-release-${{ github.sha }}
          path: build/app/outputs/
          retention-days: 14
