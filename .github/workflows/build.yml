name: Build Android
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
      - run: sed -i 's/flutter.compileSdkVersion/34/g' android/app/build.gradle
      - run: sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle
      - run: sed -i 's/flutter.targetSdkVersion/34/g' android/app/build.gradle
      - run: flutter clean
      - run: flutter pub get
      - run: flutter build apk --release
      - run: flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: build/app/outputs/
