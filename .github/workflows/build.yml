name: Build Production Android Assets

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: ''

      # Pinned to 3.24.5 — last stable before AGP 9+ DSL-only enforcement.
      - name: Set up Flutter Engine Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install Project Dependencies
        run: flutter pub get

      # Fix flutter_inappwebview_android using deprecated proguard-android.txt
      # which AGP 8+ no longer accepts.
      # chmod +w is required: pub-cache files are read-only by default and
      # sed -i silently fails (exit 0) on read-only files, leaving the build broken.
      - name: Fix flutter_inappwebview ProGuard AGP 8 Compatibility
        run: |
          echo "Patching flutter_inappwebview ProGuard..."
          CACHE_ROOT="${PUB_CACHE:-$HOME/.pub-cache}"
          find "$CACHE_ROOT" -name "build.gradle" \
            -path "*/flutter_inappwebview_android*" \
            -print | while read -r f; do
            chmod +w "$f"
            sed -i \
              "s/getDefaultProguardFile('proguard-android\.txt')/getDefaultProguardFile('proguard-android-optimize.txt')/g" \
              "$f"
          done
          echo "✓ ProGuard patched"

      # Fix speech_to_text jcenter (kept for safety, harmless on v7)
      - name: Fix speech_to_text JCenter Repository
        run: |
          echo "Patching speech_to_text jcenter() → mavenCentral()..."
          find "${PUB_CACHE:-$HOME/.pub-cache}" -name "build.gradle" \
            -path "*/speech_to_text*" \
            -print \
            -exec sed -i "s/jcenter()/mavenCentral()/g" {} +
          echo "✓ jcenter patched"

      # Regenerate the android/ platform folder fresh from Flutter 3.24.5.
      # NOTE: flutter create internally runs flutter pub get, which can
      # re-extract pub cache packages and undo any patches applied before
      # this step. The speech_to_text patch is therefore placed AFTER this
      # step intentionally.
      - name: Generate Android Platform Files
        run: |
          rm -rf android
          flutter create \
            --platforms android \
            --org com.example \
            --project-name nova_x \
            .

      # Fix speech_to_text 7.x AFTER flutter create (so pub get inside
      # flutter create cannot undo the patch).
      #
      # ROOT CAUSE OF PREVIOUS FAILURES:
      #   pub-cache files are installed as read-only (chmod 444).
      #   sed -i on a read-only file exits with code 1 BUT the shell does not
      #   propagate that error when sed is inside a compound command — so the
      #   step reports success while the file stays completely unpatched.
      #   Adding chmod +w before sed -i is the only required fix.
      - name: Fix speech_to_text Flutter SDK Property References
        run: |
          # Honour $PUB_CACHE if flutter-action set it; fall back to default.
          CACHE_ROOT="${PUB_CACHE:-$HOME/.pub-cache}"
          echo "Using pub cache root: $CACHE_ROOT"

          # Locate speech_to_text's android/build.gradle (any version).
          STT_GRADLE=$(find "$CACHE_ROOT" \
            -name "build.gradle" \
            -path "*/speech_to_text*/android/*" \
            2>/dev/null | head -1)

          if [ -z "$STT_GRADLE" ]; then
            echo "ERROR: speech_to_text build.gradle not found under $CACHE_ROOT"
            echo "Searching entire filesystem as fallback..."
            STT_GRADLE=$(find / -name "build.gradle" \
              -path "*/speech_to_text*/android/*" \
              2>/dev/null | head -1)
          fi

          if [ -z "$STT_GRADLE" ]; then
            echo "FATAL: speech_to_text build.gradle not found anywhere — aborting."
            exit 1
          fi

          echo "Patching: $STT_GRADLE"
          echo "--- BEFORE ---"
          cat "$STT_GRADLE"

          # CRITICAL: make the file writable before sed.
          # pub-cache files are read-only (444). sed -i silently fails on them —
          # exits 1 but the step still shows green because it is not the last
          # command. Without this chmod the file is NEVER patched.
          chmod +w "$STT_GRADLE"

          sed -i \
            -e 's/flutter\.compileSdkVersion/35/g' \
            -e 's/flutter\.targetSdkVersion/35/g'  \
            -e 's/flutter\.minSdkVersion/21/g'      \
            "$STT_GRADLE"

          echo "--- AFTER ---"
          cat "$STT_GRADLE"

          # Hard verification — fail loudly if any flutter.* SDK refs remain.
          if grep -qE 'flutter\.(compileSdkVersion|targetSdkVersion|minSdkVersion)' "$STT_GRADLE"; then
            echo "FATAL: patch did not apply — flutter SDK refs still present in $STT_GRADLE"
            exit 1
          fi

          echo "✓ speech_to_text SDK refs patched"

      # audioplayers_android requires compileSdk 35; flutter create generates 34.
      # Uses sed — no Python heredoc escaping issues.
      - name: Bump Android compileSdk to 35
        run: |
          echo "Patching android/app/build.gradle compileSdk → 35..."
          APP_GRADLE="android/app/build.gradle"
          echo "--- BEFORE ---"
          cat "$APP_GRADLE"
          sed -i \
            -e 's/compileSdkVersion flutter\.compileSdkVersion/compileSdkVersion 35/g' \
            -e 's/targetSdkVersion flutter\.targetSdkVersion/targetSdkVersion 35/g'   \
            -e 's/compileSdk = flutter\.compileSdkVersion/compileSdk = 35/g'          \
            -e 's/targetSdk = flutter\.targetSdkVersion/targetSdk = 35/g'             \
            -e 's/compileSdk flutter\.compileSdkVersion/compileSdk 35/g'              \
            -e 's/targetSdk flutter\.targetSdkVersion/targetSdk 35/g'                \
            "$APP_GRADLE"
          echo "--- AFTER ---"
          cat "$APP_GRADLE"
          echo "✓ compileSdk bumped to 35"

      # Patch AndroidManifest with all required permissions for v2.1
      #   - INTERNET + ACCESS_NETWORK_STATE   (browser core)
      #   - RECORD_AUDIO + MODIFY_AUDIO       (voice search / speech_to_text)
      #   - READ_MEDIA_IMAGES                 (image_picker Android 13+)
      #   - READ_EXTERNAL_STORAGE maxSdk=32   (image_picker Android 12 and below)
      - name: Patch Android Manifest
        run: |
          M="android/app/src/main/AndroidManifest.xml"

          sed -i 's/android:label="nova_x"/android:label="NOVA X"/' "$M"

          sed -i 's|<manifest xmlns:android="http://schemas.android.com/apk/res/android">|<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>|' "$M"

          sed -i 's|android:icon="@mipmap/ic_launcher">|android:icon="@mipmap/ic_launcher"\n        android:usesCleartextTraffic="true"\n        android:hardwareAccelerated="true">|' "$M"

          echo "── Patched AndroidManifest ──"
          cat "$M"

      - name: Configure Gradle Java Home
        run: echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - name: Compile Release APK Bundle
        run: flutter build apk --release

      - name: Compile Distribution AAB Package
        run: flutter build appbundle --release

      - name: Archive Compiled Binaries
        uses: actions/upload-artifact@v4
        with:
          name: nova-x-v2.1-release-${{ github.sha }}
          path: build/app/outputs/
          retention-days: 14
