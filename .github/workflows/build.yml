name: Build Production Android Assets
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Fix Gradle Java Home
        run: echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          
      - name: Patch Android SDK Versions
        run: sed -i 's/flutter.compileSdkVersion/34/g' android/app/build.gradle && sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle && sed -i 's/flutter.targetSdkVersion/34/g' android/app/build.gradle
          
      - name: Clean and Install
        run: flutter clean && flutter pub get
        
      - name: Build Release APK
        run: flutter build apk --release
        
      - name: Build Release AAB
        run: flutter build appbundle --release
        
      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: production-builds
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
