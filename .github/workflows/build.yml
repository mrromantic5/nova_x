name: Build Production Android Assets

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: ''

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview ProGuard
        run: |
          CACHE="${PUB_CACHE:-$HOME/.pub-cache}"
          find "$CACHE" -name "build.gradle" -path "*/flutter_inappwebview_android*" 2>/dev/null | while read -r f; do
            chmod +w "$f" 2>/dev/null || true
            sed -i "s/getDefaultProguardFile('proguard-android\.txt')/getDefaultProguardFile('proguard-android-optimize.txt')/g" "$f"
          done
          echo "✓ ProGuard patched"

      - name: Patch jcenter to mavenCentral
        run: |
          CACHE="${PUB_CACHE:-$HOME/.pub-cache}"
          find "$CACHE" -name "build.gradle" -exec sed -i 's/jcenter()/mavenCentral()/g' {} +
          echo "✓ jcenter replaced"

      - name: Regenerate Android Platform Files
        run: |
          rm -rf android
          flutter create --platforms android --org com.example --project-name nova_x .
          echo "✓ android/ regenerated"

      - name: Copy google-services.json
        run: |
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/google-services.json
            echo "✓ google-services.json copied"
          else
            echo "::error::google-services.json NOT FOUND in repo root!"
            exit 1
          fi

      - name: Set app icon from logo.png
        run: |
          pip install Pillow --break-system-packages -q
          python3 << 'PYEOF'
          from PIL import Image
          import os
          logo_path = 'assets/images/logo.png'
          if not os.path.exists(logo_path):
              print(f'WARNING: {logo_path} not found — keeping default icon')
              exit(0)
          sizes = {
              'mipmap-mdpi': 48, 'mipmap-hdpi': 72,
              'mipmap-xhdpi': 96, 'mipmap-xxhdpi': 144, 'mipmap-xxxhdpi': 192,
          }
          logo = Image.open(logo_path).convert('RGBA')
          for d, s in sizes.items():
              out = f'android/app/src/main/res/{d}'
              os.makedirs(out, exist_ok=True)
              r = logo.resize((s, s), Image.LANCZOS)
              r.save(f'{out}/ic_launcher.png')
              r.save(f'{out}/ic_launcher_round.png')
              print(f'  ✓ {d}: {s}x{s}px')
          print('✅ App icon set from logo.png')
          PYEOF

      - name: Apply Google Services Plugin
        run: |
          APP="android/app/build.gradle"
          SET="android/settings.gradle"
          if ! grep -q "com.google.gms.google-services" "$SET"; then
            sed -i '/id "com.android.application" version/a\    id "com.google.gms.google-services" version "4.4.0" apply false' "$SET"
          fi
          if ! grep -q "com.google.gms.google-services" "$APP"; then
            sed -i '/^plugins {/a\    id "com.google.gms.google-services"' "$APP"
          fi
          echo "✓ Firebase Gradle applied"

      - name: Bump compileSdk to 35
        run: |
          F="android/app/build.gradle"
          sed -i 's/compileSdkVersion flutter\.compileSdkVersion/compileSdkVersion 35/g' "$F"
          sed -i 's/targetSdkVersion flutter\.targetSdkVersion/targetSdkVersion 35/g'   "$F"
          sed -i 's/compileSdk flutter\.compileSdkVersion/compileSdk 35/g'              "$F"
          sed -i 's/targetSdk flutter\.targetSdkVersion/targetSdk 35/g'                 "$F"
          sed -i 's/compileSdk = flutter\.compileSdkVersion/compileSdk = 35/g'          "$F"
          sed -i 's/targetSdk = flutter\.targetSdkVersion/targetSdk = 35/g'             "$F"
          echo "✓ compileSdk bumped to 35"

      # ─────────────────────────────────────────────────────────────────────
      # PATCH the Flutter-generated AndroidManifest — do NOT replace it.
      # Replacing the entire manifest loses the flutterEmbedding=2 meta-data
      # that Flutter generates, causing: "Build failed due to use of deleted
      # Android v1 embedding."
      # ─────────────────────────────────────────────────────────────────────
      - name: Patch AndroidManifest.xml
        run: |
          M="android/app/src/main/AndroidManifest.xml"

          echo "--- ORIGINAL ---"
          cat "$M"

          # 1. App label
          sed -i 's/android:label="nova_x"/android:label="NOVA X"/' "$M"

          # 2. Permissions block (inserted after opening <manifest> tag)
          sed -i 's|<manifest xmlns:android="http://schemas.android.com/apk/res/android">|<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>|' "$M"

          # 3. App-level attributes (cleartext + hardware acceleration)
          sed -i 's|android:icon="@mipmap/ic_launcher">|android:icon="@mipmap/ic_launcher"\n        android:usesCleartextTraffic="true"\n        android:hardwareAccelerated="true">|' "$M"

          # 4. launchMode=singleTop on MainActivity (required for FCM tap to work)
          sed -i 's|android:name=".MainActivity"|android:name=".MainActivity"\n            android:launchMode="singleTop"|' "$M"

          # 5. FCM intent-filter + metadata via Python (reliable multi-line insertion)
          python3 << 'PYEOF'
          content = open('android/app/src/main/AndroidManifest.xml').read()

          # Add FLUTTER_NOTIFICATION_CLICK intent-filter after the launcher intent-filter.
          # Replace only the FIRST occurrence of </intent-filter> so we don't duplicate.
          fcm_filter = (
              '\n            </intent-filter>'
              '\n            <!-- FCM: tap notification to open app -->'
              '\n            <intent-filter>'
              '\n                <action android:name="FLUTTER_NOTIFICATION_CLICK"/>'
              '\n                <category android:name="android.intent.category.DEFAULT"/>'
              '\n            </intent-filter>'
          )
          # Find first </intent-filter> and add our block after it
          first = content.find('</intent-filter>')
          if first != -1 and 'FLUTTER_NOTIFICATION_CLICK' not in content:
              content = content[:first] + fcm_filter + content[first + len('</intent-filter>'):]

          # Add FCM channel metadata before closing </application>
          if 'nova_x_channel' not in content:
              fcm_meta = (
                  '        <meta-data android:name="com.google.firebase.messaging.default_notification_channel_id" android:value="nova_x_channel"/>\n'
                  '        <meta-data android:name="com.google.firebase.messaging.default_notification_icon" android:resource="@mipmap/ic_launcher"/>\n'
                  '        <meta-data android:name="com.google.firebase.messaging.default_notification_color" android:resource="@color/nova_x_cyan"/>\n'
              )
              content = content.replace('</application>', fcm_meta + '    </application>')

          open('android/app/src/main/AndroidManifest.xml', 'w').write(content)
          print('✓ FCM intent-filter and metadata added')
          PYEOF

          echo "--- PATCHED ---"
          cat "$M"
          echo "✓ AndroidManifest patched"

      - name: Create notification colour resource
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/colors.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="nova_x_cyan">#00D4FF</color>
          </resources>
          XMLEOF
          echo "✓ colors.xml created"

      - name: Configure Gradle Java Home
        run: echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - name: Final Verification
        run: |
          echo "=== google-services.json ==="
          ls -la android/app/google-services.json
          echo "=== compileSdk ==="
          grep -E "compileSdk|targetSdk" android/app/build.gradle | head -4
          echo "=== FCM intent filter present ==="
          grep "FLUTTER_NOTIFICATION_CLICK" android/app/src/main/AndroidManifest.xml
          echo "=== launchMode ==="
          grep "launchMode" android/app/src/main/AndroidManifest.xml
          echo "=== flutterEmbedding (must be present) ==="
          grep "flutterEmbedding" android/app/src/main/AndroidManifest.xml || echo "NOTE: generated by flutter create automatically"
          echo "✅ All verified"

      - name: Build Release APK
        run: flutter build apk --release

      - name: Build Release AAB
        run: flutter build appbundle --release

      - name: Archive Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nova-x-v2.6-release-${{ github.sha }}
          path: build/app/outputs/
          retention-days: 14
