name: Build Production Android Assets
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Java Development Kit (Force Java 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Set up Flutter Engine
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Patch Android SDK & Kotlin Versions
        run: |
          sed -i 's/flutter.compileSdkVersion/34/g' android/app/build.gradle
          sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle
          sed -i 's/flutter.targetSdkVersion/34/g' android/app/build.gradle
          sed -i "s/ext.kotlin_version = '[^']*'/ext.kotlin_version = '1.9.0'/g" android/build.gradle
          
      - name: Install Project Dependencies
        run: flutter pub get
        
      - name: Compile Release APK Bundle
        run: flutter build apk --release
        
      - name: Compile Distribution AAB Package
        run: flutter build appbundle --release
        
      - name: Archive Compiled Binaries
        uses: actions/upload-artifact@v4
        with:
          name: production-builds
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
