name: Build Production Android Assets

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: ''

      - name: Set up Flutter Engine Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Project Dependencies
        run: flutter pub get

      # Fix flutter_inappwebview_android using deprecated proguard-android.txt
      # which AGP 8+ no longer accepts — patch it in the pub cache before build.
      - name: Fix flutter_inappwebview ProGuard AGP 8 Compatibility
        run: |
          echo "Patching flutter_inappwebview ProGuard..."
          find "$HOME/.pub-cache" -name "build.gradle" \
            -path "*/flutter_inappwebview_android*" \
            -print \
            -exec sed -i \
              "s/getDefaultProguardFile('proguard-android\.txt')/getDefaultProguardFile('proguard-android-optimize.txt')/g" \
              {} +
          echo "✓ ProGuard patched"

      - name: Generate Android Platform Files
        run: |
          rm -rf android
          flutter create \
            --platforms android \
            --org com.example \
            --project-name nova_x \
            .

      # Patch AndroidManifest with all required permissions for v2.1
      - name: Patch Android Manifest
        run: |
          M="android/app/src/main/AndroidManifest.xml"

          # App label
          sed -i 's/android:label="nova_x"/android:label="NOVA X"/' "$M"

          # All required permissions (INTERNET + network + mic for voice search)
          sed -i 's|<manifest xmlns:android="http://schemas.android.com/apk/res/android">|<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>|' "$M"

          # Allow cleartext HTTP + hardware acceleration for WebView
          sed -i 's|android:icon="@mipmap/ic_launcher">|android:icon="@mipmap/ic_launcher"\n        android:usesCleartextTraffic="true"\n        android:hardwareAccelerated="true">|' "$M"

          echo "── Patched AndroidManifest ──"
          cat "$M"

      - name: Configure Gradle Java Home
        run: echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - name: Compile Release APK Bundle
        run: flutter build apk --release

      - name: Compile Distribution AAB Package
        run: flutter build appbundle --release

      - name: Archive Compiled Binaries
        uses: actions/upload-artifact@v4
        with:
          name: nova-x-v2.1-release-${{ github.sha }}
          path: build/app/outputs/
          retention-days: 14
