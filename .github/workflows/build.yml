name: Build Production Android Assets

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: ''

      # Pinned to 3.24.5 — last stable before AGP 9+ DSL-only enforcement.
      - name: Set up Flutter Engine Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install Project Dependencies
        run: flutter pub get

      # Fix flutter_inappwebview_android using deprecated proguard-android.txt
      # which AGP 8+ no longer accepts.
      - name: Fix flutter_inappwebview ProGuard AGP 8 Compatibility
        run: |
          echo "Patching flutter_inappwebview ProGuard..."
          find "$HOME/.pub-cache" -name "build.gradle" \
            -path "*/flutter_inappwebview_android*" \
            -print \
            -exec sed -i \
              "s/getDefaultProguardFile('proguard-android\.txt')/getDefaultProguardFile('proguard-android-optimize.txt')/g" \
              {} +
          echo "✓ ProGuard patched"

      # Fix speech_to_text jcenter (kept for safety, harmless on v7)
      - name: Fix speech_to_text JCenter Repository
        run: |
          echo "Patching speech_to_text jcenter() → mavenCentral()..."
          find "$HOME/.pub-cache" -name "build.gradle" \
            -path "*/speech_to_text*" \
            -print \
            -exec sed -i "s/jcenter()/mavenCentral()/g" {} +
          echo "✓ jcenter patched"

      # Fix speech_to_text 7.x — its build.gradle references flutter.compileSdkVersion,
      # flutter.minSdkVersion and flutter.targetSdkVersion which are Flutter app-level
      # extension properties. They are NOT available inside plugin build.gradle files,
      # causing: "Could not get unknown property 'flutter' for extension 'android'"
      # Solution: replace all flutter.* SDK references with hardcoded values.
      #
      # BUG FIX: previous regex used r'flutter\\.xxx' (double backslash) which
      # matches a literal backslash before the dot — NOT a plain dot. The correct
      # pattern is r'flutter\.xxx' (single backslash = escaped dot in regex),
      # which matches the actual text flutter.compileSdkVersion in the file.
      - name: Fix speech_to_text Flutter SDK Property References
        run: |
          echo "Patching speech_to_text flutter.* SDK references..."
          python3 << 'PYEOF'
          import pathlib, re

          # Find all speech_to_text build.gradle files in pub cache
          pub_cache = pathlib.Path.home() / '.pub-cache'
          gradle_files = list(pub_cache.glob('**/speech_to_text*/android/build.gradle'))

          if not gradle_files:
            print('No speech_to_text build.gradle found — skipping')
          else:
            for f in gradle_files:
              print(f'Patching: {f}')
              txt = f.read_text()

              # FIXED: single backslash r'flutter\.x' → matches literal dot in text
              txt = re.sub(r'flutter\.compileSdkVersion', '35', txt)
              txt = re.sub(r'flutter\.targetSdkVersion',  '35', txt)
              txt = re.sub(r'flutter\.minSdkVersion',     '21', txt)

              f.write_text(txt)
              print(f'  ✓ Patched {f.name}')
              # Show the android block to confirm replacements took effect
              for line in txt.splitlines():
                if any(k in line for k in ['compileSdk','targetSdk','minSdk','namespace']):
                  print(f'    {line.strip()}')
          PYEOF
          echo "✓ speech_to_text SDK refs patched"

      - name: Generate Android Platform Files
        run: |
          rm -rf android
          flutter create \
            --platforms android \
            --org com.example \
            --project-name nova_x \
            .

      # audioplayers_android requires compileSdk 35; flutter create generates 34.
      - name: Bump Android compileSdk to 35
        run: |
          echo "Patching compileSdk to 35 (handles all Flutter gradle formats)..."
          python3 << 'PYEOF2'
          import re, pathlib
          f = pathlib.Path('android/app/build.gradle')
          txt = f.read_text()

          # FIXED: single backslash r'flutter\.x' → matches literal dot in text
          txt = re.sub(r'compileSdkVersion\s+flutter\.compileSdkVersion', 'compileSdkVersion 35', txt)
          txt = re.sub(r'targetSdkVersion\s+flutter\.targetSdkVersion',   'targetSdkVersion 35',  txt)
          txt = re.sub(r'compileSdk\s*=\s*flutter\.compileSdkVersion',    'compileSdk = 35', txt)
          txt = re.sub(r'targetSdk\s*=\s*flutter\.targetSdkVersion',      'targetSdk = 35',  txt)
          txt = re.sub(r'compileSdk\s+flutter\.compileSdkVersion',         'compileSdk 35', txt)
          txt = re.sub(r'targetSdk\s+flutter\.targetSdkVersion',           'targetSdk 35',  txt)

          f.write_text(txt)
          print('SDK bumped to 35')
          PYEOF2
          grep -E "compileSdk|targetSdk" android/app/build.gradle

      # Patch AndroidManifest with all required permissions for v2.1
      #   - INTERNET + ACCESS_NETWORK_STATE   (browser core)
      #   - RECORD_AUDIO + MODIFY_AUDIO       (voice search / speech_to_text)
      #   - READ_MEDIA_IMAGES                 (image_picker Android 13+)
      #   - READ_EXTERNAL_STORAGE maxSdk=32   (image_picker Android 12 and below)
      - name: Patch Android Manifest
        run: |
          M="android/app/src/main/AndroidManifest.xml"

          # App label
          sed -i 's/android:label="nova_x"/android:label="NOVA X"/' "$M"

          # All permissions injected after opening <manifest> tag
          sed -i 's|<manifest xmlns:android="http://schemas.android.com/apk/res/android">|<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>|' "$M"

          # Cleartext HTTP + hardware acceleration for WebView
          sed -i 's|android:icon="@mipmap/ic_launcher">|android:icon="@mipmap/ic_launcher"\n        android:usesCleartextTraffic="true"\n        android:hardwareAccelerated="true">|' "$M"

          echo "── Patched AndroidManifest ──"
          cat "$M"

      - name: Configure Gradle Java Home
        run: echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - name: Compile Release APK Bundle
        run: flutter build apk --release

      - name: Compile Distribution AAB Package
        run: flutter build appbundle --release

      - name: Archive Compiled Binaries
        uses: actions/upload-artifact@v4
        with:
          name: nova-x-v2.1-release-${{ github.sha }}
          path: build/app/outputs/
          retention-days: 14
