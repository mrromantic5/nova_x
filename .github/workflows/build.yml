name: Build Production Android Assets

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: ''

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview ProGuard
        run: |
          CACHE="${PUB_CACHE:-$HOME/.pub-cache}"
          find "$CACHE" -name "build.gradle" -path "*/flutter_inappwebview_android*" 2>/dev/null | while read -r f; do
            chmod +w "$f" 2>/dev/null || true
            sed -i "s/getDefaultProguardFile('proguard-android\.txt')/getDefaultProguardFile('proguard-android-optimize.txt')/g" "$f"
            echo "✓ ProGuard patched: $f"
          done

      - name: Patch jcenter to mavenCentral
        run: |
          CACHE="${PUB_CACHE:-$HOME/.pub-cache}"
          find "$CACHE" -name "build.gradle" -exec sed -i 's/jcenter()/mavenCentral()/g' {} +
          echo "✓ jcenter replaced"

      - name: Regenerate Android Platform Files
        run: |
          rm -rf android
          flutter create --platforms android --org com.example --project-name nova_x .
          echo "✓ android/ regenerated"

      - name: Copy google-services.json
        run: |
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/google-services.json
            echo "✓ google-services.json copied"
          else
            echo "::error::google-services.json NOT FOUND in repo root!"
            exit 1
          fi


      # ─────────────────────────────────────────────────────────────────────
      # APP ICON — resize assets/images/logo.png to all Android mipmap sizes
      # ─────────────────────────────────────────────────────────────────────
      - name: Set app icon from logo.png
        run: |
          pip install Pillow --break-system-packages -q
          python3 << 'PYEOF2'
          from PIL import Image
          import os
          logo_path = 'assets/images/logo.png'
          if not os.path.exists(logo_path):
              print(f'WARNING: {logo_path} not found — keeping default icon')
              exit(0)
          sizes = {
              'mipmap-mdpi': 48, 'mipmap-hdpi': 72,
              'mipmap-xhdpi': 96, 'mipmap-xxhdpi': 144, 'mipmap-xxxhdpi': 192,
          }
          logo = Image.open(logo_path).convert('RGBA')
          for d, s in sizes.items():
              out = f'android/app/src/main/res/{d}'
              os.makedirs(out, exist_ok=True)
              r = logo.resize((s, s), Image.LANCZOS)
              r.save(f'{out}/ic_launcher.png')
              r.save(f'{out}/ic_launcher_round.png')
              print(f'✓ {d}: {s}x{s}px')
          print('✅ App icon set from logo.png')
          PYEOF2

      # ──────────────────────────────────────────────────────────────────────
      # FIREBASE: Flutter 3.24.5 generates a new-style build.gradle with a
      # plugins {} block at LINE 1. The ONLY correct way to add google-services
      # is INSIDE that plugins {} block. Using `apply plugin:` BEFORE plugins {}
      # causes the Gradle error: "only buildscript/pluginManagement/plugins blocks
      # are allowed before plugins {} blocks".
      # ──────────────────────────────────────────────────────────────────────
      - name: Apply Google Services Plugin (Firebase)
        run: |
          APP="android/app/build.gradle"
          SET="android/settings.gradle"

          echo "--- BEFORE app/build.gradle ---"
          head -10 "$APP"

          # 1. Declare the plugin version in settings.gradle (new-style resolution)
          if ! grep -q "com.google.gms.google-services" "$SET"; then
            sed -i '/id "com.android.application" version/a\    id "com.google.gms.google-services" version "4.4.0" apply false' "$SET"
            echo "✓ google-services version declared in settings.gradle"
          fi

          # 2. Apply the plugin INSIDE the plugins {} block — NOT before it
          if ! grep -q "com.google.gms.google-services" "$APP"; then
            sed -i '/^plugins {/a\    id "com.google.gms.google-services"' "$APP"
            echo "✓ google-services added inside plugins {} block"
          fi

          # 3. Safety check — bare apply plugin: before plugins {} is fatal
          if head -3 "$APP" | grep -q "^apply plugin"; then
            echo "::error::apply plugin: found before plugins {} block — Gradle will fail"
            exit 1
          fi

          echo "--- AFTER app/build.gradle (first 10 lines) ---"
          head -10 "$APP"
          echo "✅ Firebase Gradle integration verified"

      - name: Bump compileSdk to 35
        run: |
          F="android/app/build.gradle"
          sed -i 's/compileSdkVersion flutter\.compileSdkVersion/compileSdkVersion 35/g' "$F"
          sed -i 's/targetSdkVersion flutter\.targetSdkVersion/targetSdkVersion 35/g'   "$F"
          sed -i 's/compileSdk flutter\.compileSdkVersion/compileSdk 35/g'              "$F"
          sed -i 's/targetSdk flutter\.targetSdkVersion/targetSdk 35/g'                 "$F"
          sed -i 's/compileSdk = flutter\.compileSdkVersion/compileSdk = 35/g'          "$F"
          sed -i 's/targetSdk = flutter\.targetSdkVersion/targetSdk = 35/g'             "$F"
          echo "✓ compileSdk bumped to 35"
          grep -E "compileSdk|targetSdk" "$F"

      # FCM tap fix: launchMode="singleTop" + FLUTTER_NOTIFICATION_CLICK intent filter
      # Without these, tapping a push notification does NOT open the app.
      - name: Write complete AndroidManifest.xml
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'XMLEOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>
              <application
                  android:label="NOVA X"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                      <intent-filter>
                          <action android:name="FLUTTER_NOTIFICATION_CLICK"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="io.flutter.embedding.android.SplashScreenDrawable" android:resource="@drawable/launch_background"/>
                  <meta-data android:name="com.google.firebase.messaging.default_notification_channel_id" android:value="nova_x_channel"/>
                  <meta-data android:name="com.google.firebase.messaging.default_notification_icon" android:resource="@mipmap/ic_launcher"/>
                  <meta-data android:name="com.google.firebase.messaging.default_notification_color" android:resource="@color/nova_x_cyan"/>
              </application>
          </manifest>
          XMLEOF
          echo "✓ AndroidManifest.xml written with FCM tap support"

      - name: Create colour resource
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/colors.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><color name="nova_x_cyan">#00D4FF</color></resources>
          XMLEOF
          echo "✓ colors.xml created"

      - name: Configure Gradle Java Home
        run: echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - name: Final Verification
        run: |
          echo "=== google-services.json present ==="
          ls -la android/app/google-services.json
          echo "=== First 15 lines of app/build.gradle ==="
          head -15 android/app/build.gradle
          if ! grep -q "com.google.gms.google-services" android/app/build.gradle; then
            echo "::error::google-services plugin NOT in app/build.gradle"
            exit 1
          fi
          echo "✅ All verified — building"

      - name: Build Release APK
        run: flutter build apk --release

      - name: Build Release AAB
        run: flutter build appbundle --release

      - name: Archive Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nova-x-v2.4-release-${{ github.sha }}
          path: build/app/outputs/
          retention-days: 14
