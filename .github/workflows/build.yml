name: Build Production Android Assets

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: ''

      - name: Set up Flutter Engine Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install Project Dependencies
        run: flutter pub get

      - name: Fix flutter_inappwebview ProGuard AGP 8 Compatibility
        run: |
          CACHE_ROOT="${PUB_CACHE:-$HOME/.pub-cache}"
          find "$CACHE_ROOT" -name "build.gradle" -path "*/flutter_inappwebview_android*" | while read -r f; do
            chmod +w "$(dirname "$f")" "$f"
            sed -i "s/getDefaultProguardFile('proguard-android.txt')/getDefaultProguardFile('proguard-android-optimize.txt')/g" "$f"
            echo "Patched: $f"
          done
          echo "ProGuard fix done"

      - name: Verify Android Manifest
        run: |
          M="android/app/src/main/AndroidManifest.xml"
          echo "=== AndroidManifest.xml (verification) ==="
          cat "$M"

      - name: Configure Gradle Java Home
        run: echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - name: Ensure gradlew is executable
        run: chmod +x android/gradlew

      - name: Restore Gradle Wrapper JAR
        run: |
          WRAPPER_JAR="android/gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$WRAPPER_JAR" ]; then
            FLUTTER_ROOT=$(flutter --version --machine 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('flutterRoot',''))" 2>/dev/null)
            CACHED_JAR="$FLUTTER_ROOT/bin/cache/artifacts/gradle_wrapper/gradle-wrapper.jar"
            if [ -f "$CACHED_JAR" ]; then
              cp "$CACHED_JAR" "$WRAPPER_JAR"
              echo "Restored gradle-wrapper.jar from Flutter SDK cache"
            else
              echo "Flutter cache JAR not found — running flutter precache"
              flutter precache --android
              cp "$CACHED_JAR" "$WRAPPER_JAR"
              echo "Restored gradle-wrapper.jar after precache"
            fi
          else
            echo "gradle-wrapper.jar already present"
          fi

      - name: Compile Release APK Bundle
        run: flutter build apk --release

      - name: Compile Distribution AAB Package
        run: flutter build appbundle --release

      - name: Archive Compiled Binaries
        uses: actions/upload-artifact@v4
        with:
          name: nova-x-v2.1-release-${{ github.sha }}
          path: build/app/outputs/
          retention-days: 14
