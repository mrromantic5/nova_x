name: ONE-TIME — Generate Upload Keystore

# Run this ONCE from your phone:
#   GitHub repo → Actions tab → "ONE-TIME — Generate Upload Keystore"
#   → Run workflow → fill the boxes → Run.
# When it finishes, open the run logs, expand "Generate keystore", and copy
# the base64 block + the values into your repo Secrets. Then DELETE this file.

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: "Key alias (leave as 'upload')"
        required: true
        default: "upload"
      store_password:
        description: "Keystore password (remember this!)"
        required: true
      key_password:
        description: "Key password (use the same as keystore password)"
        required: true
      full_name:
        description: "Your name or company (e.g. Tech Lyfe)"
        required: true
        default: "Tech Lyfe"
      org:
        description: "Organization (e.g. Tech Lyfe)"
        required: true
        default: "Tech Lyfe"
      country:
        description: "2-letter country code (e.g. GH)"
        required: true
        default: "GH"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate keystore
        env:
          ALIAS:    ${{ github.event.inputs.key_alias }}
          STOREPW:  ${{ github.event.inputs.store_password }}
          KEYPW:    ${{ github.event.inputs.key_password }}
          CN:       ${{ github.event.inputs.full_name }}
          ORG:      ${{ github.event.inputs.org }}
          COUNTRY:  ${{ github.event.inputs.country }}
        run: |
          keytool -genkeypair -v \
            -keystore upload-keystore.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias "$ALIAS" \
            -storepass "$STOREPW" \
            -keypass "$KEYPW" \
            -dname "CN=$CN, O=$ORG, C=$COUNTRY"

          echo ""
          echo "=================================================================="
          echo " ✓ KEYSTORE CREATED. Copy the values below into repo Secrets:"
          echo "   (Settings → Secrets and variables → Actions → New repository secret)"
          echo "=================================================================="
          echo ""
          echo ">>> SECRET 1 of 4 — name it:  KEYSTORE_BASE64"
          echo ">>> value = everything between the BEGIN/END lines (no spaces):"
          echo "------------------------- BEGIN KEYSTORE_BASE64 -------------------------"
          base64 -w0 upload-keystore.jks
          echo ""
          echo "-------------------------- END KEYSTORE_BASE64 --------------------------"
          echo ""
          echo ">>> SECRET 2 of 4 — name: KEYSTORE_PASSWORD   value: (the keystore password you entered)"
          echo ">>> SECRET 3 of 4 — name: KEY_PASSWORD        value: (the key password you entered)"
          echo ">>> SECRET 4 of 4 — name: KEY_ALIAS           value: $ALIAS"
          echo ""
          echo "=================================================================="
          echo " AFTER copying all 4 secrets:"
          echo "   1. Delete this workflow file (.github/workflows/generate-keystore.yml)"
          echo "   2. Push your main build.yml and run it — your build will be signed."
          echo "=================================================================="

      - name: Upload keystore as artifact (BACK THIS UP)
        uses: actions/upload-artifact@v4
        with:
          name: upload-keystore-BACK-THIS-UP
          path: upload-keystore.jks
          retention-days: 7
