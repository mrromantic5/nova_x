buildscript {
    ext.kotlin_version = '1.8.0'

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:7.4.2'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'

subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
    project.evaluationDependsOn(':app')

    // ── Compatibility shim ────────────────────────────────────────────────
    // speech_to_text 7.x (and other plugins built for AGP 8+) read
    // flutter.compileSdkVersion / flutter.minSdkVersion / flutter.targetSdkVersion
    // inside their own build.gradle files. With the old apply-from flutter.gradle
    // approach, the `flutter` extension is only injected into the :app module —
    // plugin library modules never receive it, causing the build to crash.
    //
    // This ext map supplies the same values to every subproject so those
    // plugins can resolve the property without errors. The real flutter
    // extension on :app always takes precedence over this ext fallback.
    // ─────────────────────────────────────────────────────────────────────
    project.ext.flutter = [
        compileSdkVersion: 34,
        minSdkVersion    : 21,
        targetSdkVersion : 34,
        ndkVersion       : "25.1.8937393"
    ]
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
