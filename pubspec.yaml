name: nova_x
description: NOVA X — The Future of Browsing
publish_to: 'none'
version: 2.4.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  flutter_inappwebview: ^6.0.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  dio: ^5.4.0
  speech_to_text: ^6.6.2
  audioplayers: ^5.2.1
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_secure_storage: ^9.0.0
  google_maps_flutter: ^2.9.0
  geolocator: ^10.1.0
  url_launcher: ^6.2.6
  video_player: ^2.9.2
  local_auth: ^2.1.8

dependency_overrides:
  js: ^0.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/backgrounds/
