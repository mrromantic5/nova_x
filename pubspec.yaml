name: nova_x
description: NOVA X — The Future of Browsing
publish_to: 'none'
version: 2.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  flutter_inappwebview: ^6.0.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  dio: ^5.4.0
  speech_to_text: ^6.6.2   # needs js ^0.7.1
  audioplayers: ^6.1.0      # FIXED: upgraded 5.x→6.x to use js ^0.7.1
                             # (5.x required js ^0.6.4 — conflicts with speech_to_text)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
