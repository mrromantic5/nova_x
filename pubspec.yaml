name: nova_x
description: The Future of Browsing
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  flutter_inappwebview: ^6.0.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  dio: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    # Single folder declaration covers logo.png and all background images.
    # FIXED: removed duplicate "- assets/images/logo.png" entry that caused
    # pub warnings about overlapping asset declarations.
    - assets/images/
