name: nova_x
description: NOVA X — The Future of Browsing
publish_to: 'none'
version: 2.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  flutter_inappwebview: ^6.0.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  dio: ^5.4.0
  # Upgraded from ^6.6.2 → ^7.4.0 to resolve js version conflict with audioplayers
  speech_to_text: ^7.4.0
  # Upgraded from ^5.2.1 → ^6.4.0 to resolve js version conflict with speech_to_text
  audioplayers: ^6.4.0
  image_picker: ^1.0.7
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
