name: nova_x
description: NOVA X — The Future of Browsing
publish_to: 'none'
version: 2.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  flutter_inappwebview: ^6.0.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  dio: ^5.4.0
  speech_to_text: ^6.6.2
  audioplayers: ^5.2.1
  image_picker: ^1.0.7      # Profile & business image upload
  path_provider: ^2.1.2     # Persist images to app documents dir

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
