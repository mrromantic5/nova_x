name: nova_x
description: NOVA X — The Future of Browsing
publish_to: 'none'
version: 2.2.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  flutter_inappwebview: ^6.0.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  dio: ^5.4.0
  # Original working versions — do NOT upgrade these
  speech_to_text: ^6.6.2
  audioplayers: ^5.2.1
  # Image upload for profile & business
  image_picker: ^1.0.7
  path_provider: ^2.1.2

# Resolves the js version conflict between speech_to_text and
# image_picker_for_web (a transitive dep). Web variants are never
# invoked on Android so forcing js ^0.7.1 is safe.
dependency_overrides:
  js: ^0.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    # Add your background images (.jpg/.png/.webp) into this folder.
    # They will appear automatically in the Customization screen.
    # The folder must exist with at least one file for Flutter to accept it.
    - assets/backgrounds/
